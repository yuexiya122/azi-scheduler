name: 调度器 - 触发A股复盘

on:
  schedule:
    # 盘前简报 8:00 北京 = UTC 0:00
    - cron: '0 0 * * 1-5'
    # 午间总结 12:00 北京 = UTC 4:00
    - cron: '0 4 * * 1-5'
    # 全天复盘 15:30 北京 = UTC 7:30
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      report_type:
        description: '报告类型'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - noon
          - afternoon

jobs:
  morning:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: 触发盘前简报
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/yuexiya122/Azi/actions/workflows/01_morning.yml/dispatches \
            -d '{"ref":"main"}'

  noon:
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: 触发午间总结
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/yuexiya122/Azi/actions/workflows/02_noon.yml/dispatches \
            -d '{"ref":"main"}'

  afternoon:
    if: github.event_name == 'schedule' && github.event.schedule == '30 7 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: 触发全天复盘
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/yuexiya122/Azi/actions/workflows/03_review.yml/dispatches \
            -d '{"ref":"main"}'

  manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 手动触发
        run: |
          case "${{ inputs.report_type }}" in
            morning)   WF="01_morning.yml" ;;
            noon)      WF="02_noon.yml" ;;
            afternoon) WF="03_review.yml" ;;
          esac
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/yuexiya122/Azi/actions/workflows/${WF}/dispatches \
            -d '{"ref":"main"}'
