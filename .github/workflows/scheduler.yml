name: 手动调度器

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: '报告类型'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - noon
          - afternoon

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: 触发A股复盘
        run: |
          case "${{ inputs.report_type }}" in
            morning)   WF="01_morning.yml" ;;
            noon)      WF="02_noon.yml" ;;
            afternoon) WF="03_review.yml" ;;
          esac
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/yuexiya122/Azi/actions/workflows/${WF}/dispatches \
            -d '{"ref":"main"}'
